<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mountview Master Challenge</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #2c3e50; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; }
        #app { width: 90%; height: 90%; background: white; border-radius: 20px; overflow-y: auto; padding: 40px; box-shadow: 0 10px 50px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #34495e; }
        .subject-box { margin-bottom: 30px; border-top: 2px solid #ecf0f1; padding-top: 20px; }
        .q-box { margin-bottom: 15px; padding: 15px; background: #f9f9f9; border-radius: 8px; }
        .btn { width: 100%; padding: 20px; background: #27ae60; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 20px; font-weight: bold; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="app">
    <div id="content">
        <h1>Mountview Master Challenge</h1>
        <input type="text" id="username" placeholder="Enter Student Name">
        <button class="btn" onclick="startApp()">Enter Assessment</button>
    </div>
</div>

<script>
    // Chapter structure: 5 chapters, each with 10 questions per subject (40 total)
    const chapters = Array.from({length: 5}, (_, chapIdx) => ({
        name: `Chapter ${chapIdx + 1}`,
        subjects: {
            Maths: Array.from({length: 10}, (_, i) => ({q: `Maths ${chapIdx+1}.${i+1}: ${10+i} + ${5+i} = ?`, options: [(15+i*2).toString(), (10+i).toString(), (20+i).toString()], ans: (15+i*2).toString()})),
            English: Array.from({length: 10}, (_, i) => ({q: `English ${chapIdx+1}.${i+1}: Identify the verb in: 'The water falls.'`, options: ["The", "water", "falls"], ans: "falls"})),
            Science: Array.from({length: 10}, (_, i) => ({q: `Science ${chapIdx+1}.${i+1}: What is precipitation?`, options: ["Water falling", "Sunlight", "A rock"], ans: "Water falling"})),
            Global: Array.from({length: 10}, (_, i) => ({q: `Global ${chapIdx+1}.${i+1}: Why is sharing important?`, options: ["It is kind", "It is bad", "It is boring"], ans: "It is kind"}))
        }
    }));

    let chapter = 0, name = "";

    function startApp() {
        name = document.getElementById('username').value;
        if(!name) return alert("Please enter your name.");
        render();
    }

    function render() {
        let chap = chapters[chapter];
        let html = `<h1>${chap.name} - ${name}</h1>`;
        for(let sub in chap.subjects) {
            html += `<div class="subject-box"><h2>${sub}</h2>`;
            chap.subjects[sub].forEach((item, i) => {
                html += `<div class="q-box"><p>${item.q}</p>${item.options.map(o => `<label><input type="radio" name="${sub}${i}" value="${o}"> ${o}</label><br>`).join('')}</div>`;
            });
            html += `</div>`;
        }
        html += `<button class="btn" onclick="next()">Submit ${chap.name}</button>`;
        document.getElementById('content').innerHTML = html;
    }

    function next() {
        chapter++;
        if(chapter < 5) render();
        else document.getElementById('content').innerHTML = `<h1>🎉 Assessment Complete!</h1><p>Great effort, ${name}!</p><button class="btn" onclick="location.reload()">Start New Challenge</button>`;
    }
</script>
</body>
</html>
