<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mountview Master Challenge</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #app { width: 80%; max-width: 600px; background: white; color: #333; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .timer { font-weight: bold; color: #e74c3c; margin-bottom: 20px; text-align: right; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; cursor: pointer; background: #3498db; color: white; font-weight: bold; }
        button:disabled { background: #bdc3c7; }
        .q-text { font-size: 22px; margin-bottom: 20px; }
        .option { display: block; padding: 10px; border: 1px solid #ddd; margin: 5px 0; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <div id="quiz-container">
        <h1>Welcome, Ethan</h1>
        <button onclick="startChallenge()">Start Assessment</button>
    </div>
</div>

<script>
    const subjects = ["Maths", "English", "Science", "Global Perspectives"];
    const quizData = {
        Maths: Array.from({length: 10}, (_, i) => ({ q: `${20+(i*2)} + ${15+i}`, options: ["35", "45", "50", "25"], ans: "0" })),
        English: Array.from({length: 10}, (_, i) => ({ q: "Choose the correct spelling:", options: ["Cat", "Catt", "Kaat", "Cattz"], ans: "0" })),
        Science: Array.from({length: 10}, (_, i) => ({ q: "Which of these is a natural material?", options: ["Plastic", "Wood", "Metal", "Glass"], ans: "1" })),
        "Global Perspectives": Array.from({length: 10}, (_, i) => ({ q: "Why is it important to recycle?", options: ["It is fun", "To save Earth", "To waste space", "It is hard"], ans: "1" }))
    };

    let currentSubjectIdx = 0, currentQ = 0, timeLeft = 600, timerInterval;

    function startChallenge() { renderQ(); startTimer(); }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft === 180) alert("⚠️ 3 minutes left!");
            if (timeLeft <= 0) { clearInterval(timerInterval); nextSubject(); }
            document.getElementById('timer-display').innerText = Math.floor(timeLeft/60) + ":" + (timeLeft%60).toString().padStart(2, '0');
        }, 1000);
    }

    function renderQ() {
        let sub = subjects[currentSubjectIdx];
        let q = quizData[sub][currentQ];
        document.getElementById('app').innerHTML = `
            <div class="timer">Time: <span id="timer-display">10:00</span></div>
            <h2>${sub}</h2>
            <div class="q-text">${currentQ + 1}. ${q.q}</div>
            ${q.options.map((o, i) => `<label class="option"><input type="radio" name="ans" value="${i}"> ${o}</label>`).join('')}
            <div class="btn-group">
                <button ${currentQ === 0 ? 'disabled' : ''} onclick="prevQ()">Previous</button>
                <button onclick="nextQ()">Next</button>
            </div>
        `;
    }

    function nextQ() {
        currentQ++;
        if (currentQ >= 10) nextSubject(); else renderQ();
    }

    function prevQ() { if(currentQ > 0) { currentQ--; renderQ(); } }

    function nextSubject() {
        clearInterval(timerInterval);
        currentSubjectIdx++;
        currentQ = 0;
        timeLeft = 600;
        if (currentSubjectIdx < subjects.length) { startChallenge(); }
        else { document.getElementById('app').innerHTML = "<h1>Assessment Complete!</h1>"; }
    }
</script>
</body>
</html>
