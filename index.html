<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relationship Questionnaire</title>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #ffd6dc; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #app { width: 350px; height: 600px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; border: 4px solid #ff4d6d; }
        .hidden { display: none !important; }
        button { padding: 15px 30px; margin: 10px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .yes { background-color: #ff4d6d; color: white; }
        .no { background-color: #f1f1f1; }
        input[type=range] { width: 200px; }
        h2 { color: #555; }
    </style>
</head>
<body>

<div id="app">
    <div id="step1">
        <h2>Do you think I'm gonna read all that?</h2>
        <button class="yes" onclick="nextStep(2)">Yes</button>
        <button class="no" onclick="alert('Wrong answer!')">No</button>
    </div>

    <div id="step2" class="hidden">
        <h2>You're right! You're wasting your time.</h2>
        <button class="yes" onclick="nextStep(3)">Next</button>
    </div>

    <div id="step3" class="hidden">
        <h2>How much do you think I care?</h2>
        <input type="range" id="careRange" min="0" max="100" value="0">
        <br><br>
        <button class="yes" onclick="nextStep(4)">Lock it in</button>
    </div>

    <div id="step4" class="hidden">
        <h2>Can you PLEASE stop texting me?</h2>
        <button class="yes" onclick="nextStep(5)">Yes</button>
        <button class="no" onclick="alert('Try again!')">No</button>
    </div>

    <div id="step5" class="hidden">
        <h2>THANK GOD 🙏</h2>
        <button class="yes" onclick="location.reload()">Restart</button>
    </div>
</div>

<script>
    function nextStep(stepNumber) {
        // Hide all steps
        for(let i=1; i<=5; i++) {
            document.getElementById('step' + i).classList.add('hidden');
        }
        // Show target step
        document.getElementById('step' + stepNumber).classList.remove('hidden');
    }
</script>

</body>
</html>
